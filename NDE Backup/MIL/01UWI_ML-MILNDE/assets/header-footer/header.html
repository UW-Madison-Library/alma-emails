<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Reset and Layout */
    * { box-sizing: border-box; }

/* Ensure the page handles stacking correctly */
body {
  margin: 0;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.header-wrapper {
  display: flex;
  flex-direction: column;
  width: 100%;
}

/* 1. Custom Bars: Static and in-flow */
.my-custom-header {
  height: 2.75em; 
  width: 100%;
  display: flex;
  flex-direction: column;
}

.header-top { height: 20%; background-color: #333333; }
.header-middle { height: 60%; background-color: #4c4c4c; }
.header-bottom { height: 20%; background-color: #ffbd00; }

/* 2. NDE Header: Naturally sits below the colored bars */
.top-bar.header {
  background-color: white;
  width: 100%;
  /* No position: absolute; it flows naturally now */
}

main {
  flex: 1; /* Pushes content down */
}
  </style>
</head>
<body>
  <div class="header-wrapper">
    <header class="my-custom-header">
      <div class="header-top"></div>
      <div class="header-middle"></div>
      <div class="header-bottom"></div>
    </header>

    <header class="top-bar flex-column header mat-elevation-z3">
      </header>
  </div>
</body>
